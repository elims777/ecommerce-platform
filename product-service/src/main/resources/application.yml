server:
  port: 8083

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:${PRODUCT_DB_PORT}/ecommerce_products
    username: "${PRODUCT_DB_USER}"
    password: "${PRODUCT_DB_PASSWORD}"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

# Yandex Object Storage Configuration
yandex:
  storage:
    access-key: "${YANDEX_STORAGE_ACCESS_KEY}"
    secret-key: "${YANDEX_STORAGE_SECRET_KEY}"
    bucket-name: ecommerce-products
    endpoint: https://storage.yandexcloud.net
    region: ru-central1
    public-url: https://storage.yandexcloud.net/ecommerce-products

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    ru.rfsnab.productservice: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    software.amazon.awssdk: DEBUG

jwt:
  secret: "${SECRET_JWT}"


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

product-service:
  import:
    chunk-size: 25