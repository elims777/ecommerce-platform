spring:
  config:
    activate:
      on-profile: test

  # H2 in-memory database с PostgreSQL compatibility
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # Отключаем Flyway для тестов (схема создается через ddl-auto)
  flyway:
    enabled: false

app:
  kafka:
    topic:
      user-events: user-events
      legal-entity-events: legal-entity-events

# JWT configuration для тестов
jwt:
  secret: test-secret-key-for-testing-must-be-at-least-256-bits-long-for-hs256

# S2S internal token (InternalTokenFilter — @Component, поднимается и в тестах)
internal:
  secret: test-secret

# Минимальное логирование
logging:
  level:
    root: WARN
    ru.rfsnab: INFO