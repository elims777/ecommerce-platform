spring:
  config:
    activate:
      on-profile: test

  # H2 in-memory database с PostgreSQL compatibility
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # Отключаем Flyway для тестов (схема создается через ddl-auto)
  flyway:
    enabled: false

# JWT configuration для тестов (если понадобится)
jwt:
  secret: test-secret-key-for-testing-must-be-at-least-256-bits-long-for-hs256
  expiration: 3600000

# Минимальное логирование
logging:
  level:
    root: WARN
    ru.rfsnab: INFO