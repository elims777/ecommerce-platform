services:
  # ==================== DATABASES ====================

  # PostgreSQL для user-service и auth-service
  user-db:
    image: postgres:16-alpine
    container_name: user-db
    restart: unless-stopped
    mem_limit: 384m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL для notification-service
  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    restart: unless-stopped
    mem_limit: 384m
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
    ports:
      - "${NOTIFICATION_DB_PORT}:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_DB_USER} -d ${NOTIFICATION_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL для product-service
  product-db:
    image: postgres:16-alpine
    container_name: product-db
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_DB: ${PRODUCT_DB_NAME}
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
    ports:
      - "${PRODUCT_DB_PORT}:5432"
    volumes:
      - product_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCT_DB_USER} -d ${PRODUCT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL для order-service
  order-db:
    image: postgres:16-alpine
    container_name: order-db
    restart: unless-stopped
    mem_limit: 384m
    environment:
      POSTGRES_DB: ${ORDER_DB_NAME}
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    ports:
      - "${ORDER_DB_PORT}:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDER_DB_USER} -d ${ORDER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL для integration-service
  integration-db:
    image: postgres:16-alpine
    container_name: integration-db
    restart: unless-stopped
    mem_limit: 384m
    environment:
      POSTGRES_DB: ${INTEGRATION_DB_NAME}
      POSTGRES_USER: ${INTEGRATION_DB_USER}
      POSTGRES_PASSWORD: ${INTEGRATION_DB_PASSWORD}
    ports:
      - "${INTEGRATION_DB_PORT}:5432"
    volumes:
      - integration_db_data:/var/lib/postgresql/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INTEGRATION_DB_USER} -d ${INTEGRATION_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ==================== KAFKA ====================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    mem_limit: 384m
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # дефолт образа — 512m heap; для одного брокера хватает с запасом
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
    ports:
      - "2181:2181"
    networks:
      - ecommerce-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    mem_limit: 1g
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      # дефолт образа -Xms1G -Xmx1G рассчитан на тысячи msg/s; наш трафик — единичные события
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      # восстановление лога брокера после пересоздания контейнера занимает ~2 мин —
      # без start_period healthcheck объявлял unhealthy через 50с и валил деплой
      start_period: 180s

  # ==================== REDIS ====================

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== SERVICES ====================

  frontend:
    image: elims777/frontend:latest
    container_name: frontend
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "3000:80"
    depends_on:
      - gateway-service
    networks:
      - ecommerce-net

  gateway-service:
    image: elims777/gateway-service:latest
    container_name: gateway-service
    restart: unless-stopped
    # JVM сама возьмёт 75% лимита под heap (MaxRAMPercentage в Dockerfile);
    # без mem_limit каждая JVM считала доступной всю память хоста
    mem_limit: 640m
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SECRET_JWT: ${SECRET_JWT}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - /var/log/rfsnab/gateway-service:/var/log/rfsnab/gateway-service
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  user-service:
    image: elims777/user-service:latest
    container_name: user-service
    restart: unless-stopped
    mem_limit: 640m
    # ports не открыты — доступ только из docker network через gateway-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SECRET_JWT: ${SECRET_JWT}
      ORDER_SERVICE_URL: http://order-service:8084
      MANAGER_EMAIL: ${MANAGER_EMAIL:-info@rfsnab.ru}
    volumes:
      - /var/log/rfsnab/user-service:/var/log/rfsnab/user-service
    depends_on:
      user-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  auth-service:
    image: elims777/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    mem_limit: 640m
    # ports не открыты — доступ только из docker network через gateway-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # JWT
      SECRET_JWT: ${SECRET_JWT}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS}
      # OAuth2 Yandex
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      # Internal services
      USER_SERVICE_URL: http://user-service:8081
      NOTIFICATION_SERVICE_URL: http://notification-service:8082
      APP_BASE_URL: ${APP_BASE_URL}
    volumes:
      - /var/log/rfsnab/auth-service:/var/log/rfsnab/auth-service
    depends_on:
      user-db:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - ecommerce-net

  notification-service:
    image: elims777/notification-service:latest
    container_name: notification-service
    restart: unless-stopped
    mem_limit: 640m
    # ports не открыты — Kafka consumer, наружу не нужен
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/${NOTIFICATION_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${NOTIFICATION_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # SMTP
      MAIL_USER: ${MAIL_USER}
      SPRING_MAIL_HOST: ${SMTP_HOST}
      SPRING_MAIL_PORT: ${SMTP_PORT}
      SPRING_MAIL_USERNAME: ${MAIL_USER}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL}
      MANAGER_EMAIL: ${MANAGER_EMAIL:-info@rfsnab.ru}
    volumes:
      - /var/log/rfsnab/notification-service:/var/log/rfsnab/notification-service
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  product-service:
    image: elims777/product-service:latest
    container_name: product-service
    restart: unless-stopped
    # больше остальных: принимает ~3000 картинок при ФТК-импорте (02.07 был убит
    # kernel OOM killer на 2.5GB RSS, когда heap не был ограничен лимитом)
    mem_limit: 1280m
    # ports не открыты — доступ только из docker network через gateway-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-db:5432/${PRODUCT_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${PRODUCT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${PRODUCT_DB_PASSWORD}
      # Yandex Object Storage
      YANDEX_STORAGE_ACCESS_KEY: ${YANDEX_STORAGE_ACCESS_KEY}
      YANDEX_STORAGE_SECRET_KEY: ${YANDEX_STORAGE_SECRET_KEY}
      SECRET_JWT: ${SECRET_JWT}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      SPRING_DATA_REDIS_HOST: redis
    volumes:
      - /var/log/rfsnab/product-service:/var/log/rfsnab/product-service
    depends_on:
      product-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  order-service:
    image: elims777/order-service:latest
    container_name: order-service
    restart: unless-stopped
    mem_limit: 768m
    # ports не открыты — доступ только из docker network через gateway-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/${ORDER_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${ORDER_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRODUCT_SERVICE_URL: http://product-service:8083
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      SECRET_JWT: ${SECRET_JWT}
    volumes:
      - /var/log/rfsnab/order-service:/var/log/rfsnab/order-service
    depends_on:
      order-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  integration-service:
    image: elims777/integration-service:latest
    container_name: integration-service
    restart: unless-stopped
    # больше остальных: скачивание и конвертация картинок при ФТК-импорте
    mem_limit: 1280m
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://integration-db:5432/${INTEGRATION_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${INTEGRATION_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${INTEGRATION_DB_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # 1С CommerceML авторизация
      CML_USERNAME: ${CML_USERNAME}
      CML_PASSWORD: ${CML_PASSWORD}
      CML_TEMP_DIR: /app/1c-exchange
      # ФТК FTP
      FTK_FTP_HOST: ${FTK_FTP_HOST}
      FTK_FTP_PORT: ${FTK_FTP_PORT}
      FTK_FTP_USERNAME: ${FTK_FTP_USERNAME}
      FTK_FTP_PASSWORD: ${FTK_FTP_PASSWORD}
      FTK_FTP_PASSIVE_PORT_START: ${FTK_FTP_PASSIVE_PORT_START}
      FTK_IMPORT_LIMIT: ${FTK_IMPORT_LIMIT}
      # Внутренние сервисы
      PRODUCT_SERVICE_URL: http://product-service:8083
      ORDER_SERVICE_URL: http://order-service:8084
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    volumes:
      - integration_exchange_data:/app/1c-exchange
      - /var/log/rfsnab/integration-service:/var/log/rfsnab/integration-service
    depends_on:
      integration-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      product-service:
        condition: service_started
      order-service:
        condition: service_started
    networks:
      - ecommerce-net


volumes:
  user_db_data:
  notification_db_data:
  product_db_data:
  redis_data:
  order_db_data:
  integration_db_data:
  integration_exchange_data:

networks:
  ecommerce-net:
    driver: bridge
