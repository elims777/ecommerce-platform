name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: elims777

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn clean verify -B
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            **/target/site/jacoco/
          retention-days: 7

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Определить изменённые файлы
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          files_yaml: |
            java_root:
              - 'pom.xml'
            auth:
              - 'auth-service/**'
            user:
              - 'user-service/**'
            notification:
              - 'notification-service/**'
            product:
              - 'product-service/**'
            order:
              - 'order-service/**'
            integration:
              - 'integration-service/**'
            gateway:
              - 'gateway-service/**'
            frontend:
              - 'frontend/**'

      - name: Set up JDK 21
        if: |
          steps.changed.outputs.java_root_any_changed == 'true' ||
          steps.changed.outputs.auth_any_changed == 'true' ||
          steps.changed.outputs.user_any_changed == 'true' ||
          steps.changed.outputs.notification_any_changed == 'true' ||
          steps.changed.outputs.product_any_changed == 'true' ||
          steps.changed.outputs.order_any_changed == 'true' ||
          steps.changed.outputs.integration_any_changed == 'true' ||
          steps.changed.outputs.gateway_any_changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs
        if: |
          steps.changed.outputs.java_root_any_changed == 'true' ||
          steps.changed.outputs.auth_any_changed == 'true' ||
          steps.changed.outputs.user_any_changed == 'true' ||
          steps.changed.outputs.notification_any_changed == 'true' ||
          steps.changed.outputs.product_any_changed == 'true' ||
          steps.changed.outputs.order_any_changed == 'true' ||
          steps.changed.outputs.integration_any_changed == 'true' ||
          steps.changed.outputs.gateway_any_changed == 'true'
        run: mvn clean package -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to Docker Hub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "TAG=develop" >> $GITHUB_OUTPUT
          fi

      - name: Build and push auth-service
        if: steps.changed.outputs.auth_any_changed == 'true' || steps.changed.outputs.java_root_any_changed == 'true'
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./auth-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/auth-service:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}/auth-service:sha-${{ github.sha }}

      - name: Build and push user-service
        if: steps.changed.outputs.user_any_changed == 'true' || steps.changed.outputs.java_root_any_changed == 'true'
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./user-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/user-service:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}/user-service:sha-${{ github.sha }}

      - name: Build and push notification-service
        if: steps.changed.outputs.notification_any_changed == 'true' || steps.changed.outputs.java_root_any_changed == 'true'
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./notification-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/notification-service:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}/notification-service:sha-${{ github.sha }}

      - name: Build and push product-service
        if: steps.changed.outputs.product_any_changed == 'true' || steps.changed.outputs.java_root_any_changed == 'true'
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./product-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/product-service:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}/product-service:sha-${{ github.sha }}

      - name: Build and push order-service
        if: steps.changed.outputs.order_any_changed == 'true' || steps.changed.outputs.java_root_any_changed == 'true'
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./order-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/order-service:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}/order-service:sha-${{ github.sha }}

      - name: Build and push integration-service
        if: steps.changed.outputs.integration_any_changed == 'true' || steps.changed.outputs.java_root_any_changed == 'true'
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./integration-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/integration-service:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}/integration-service:sha-${{ github.sha }}

      - name: Build and push gateway-service
        if: steps.changed.outputs.gateway_any_changed == 'true' || steps.changed.outputs.java_root_any_changed == 'true'
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./gateway-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/gateway-service:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}/gateway-service:sha-${{ github.sha }}

      - name: Build and push frontend
        if: steps.changed.outputs.frontend_any_changed == 'true'
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE_PREFIX }}/frontend:sha-${{ github.sha }}

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            which jq >/dev/null 2>&1 || sudo apt-get install -y jq

            cd /opt/rfsnab
            git pull origin master
            cd infra

            docker compose pull
            docker compose up -d --wait --wait-timeout 180

            FAILED=$(docker compose ps --format json | jq -r 'select(.State != "running") | .Name')
            if [ -n "$FAILED" ]; then
              echo "::error::Сервисы не в статусе running:"
              echo "$FAILED"
              docker compose ps
              exit 1
            fi

            sudo systemctl restart nginx

            docker system prune -f
