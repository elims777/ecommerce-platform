spring:
  config:
    activate:
      on-profile: test

  # OAuth2 mock настройки для тестов
  security:
    oauth2:
      client:
        registration:
          yandex:
            client-id: test-client-id
            client-secret: test-client-secret
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:9000/login/oauth2/code/yandex
        provider:
          yandex:
            authorization-uri: https://oauth.yandex.ru/authorize
            token-uri: https://oauth.yandex.ru/token
            user-info-uri: https://login.yandex.ru/info

# Mock URLs для внешних сервисов
user:
  service:
    url: http://localhost:8081
    auth: /v1/users/authenticate
    verify: http://localhost:8081/v1/users/

notification:
  service:
    url: http://localhost:8082
    verification: /verify-email?token=

# JWT настройки для тестов
jwt:
  secret: test-secret-key-for-jwt-signing-must-be-at-least-256-bits-long-for-HS256
  expiration: 3600000
  refresh-expiration: 86400000

# Минимальное логирование
logging:
  level:
    root: WARN
    ru.rfsnab: INFO