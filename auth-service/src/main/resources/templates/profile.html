<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .sidebar-header h2 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .sidebar-header p {
            color: #666;
            font-size: 14px;
        }

        .menu {
            flex: 1;
        }

        .menu-item {
            padding: 15px 20px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #333;
            text-decoration: none;
        }

        .menu-item:hover {
            background: #f5f5f5;
        }

        .menu-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .menu-item-icon {
            font-size: 20px;
        }

        .logout-btn {
            padding: 15px 20px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .logout-btn:hover {
            background: #ee5a6f;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 71, 87, 0.3);
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .profile-info h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .profile-info p {
            color: #666;
            font-size: 16px;
        }

        .profile-section {
            margin-bottom: 35px;
        }

        .profile-section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .info-item:hover {
            background: #f0f1f3;
            transform: translateY(-2px);
        }

        .info-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .info-value {
            font-size: 18px;
            color: #333;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-right: 8px;
            margin-top: 8px;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-primary {
            background: #e3e7ff;
            color: #667eea;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .error-state h2 {
            color: #333;
            margin-bottom: 16px;
            font-size: 28px;
        }

        .error-message {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 20px;
            }

            .main-content {
                padding: 20px;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-avatar {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-header">
        <h2>📋 Меню</h2>
        <p>Управление аккаунтом</p>
    </div>

    <nav class="menu">
        <a href="#" class="menu-item active">
            <span class="menu-item-icon">👤</span>
            <span>Профиль</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-item-icon">⚙️</span>
            <span>Настройки</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-item-icon">🔔</span>
            <span>Уведомления</span>
        </a>
        <a href="#" class="menu-item">
            <span class="menu-item-icon">🔒</span>
            <span>Безопасность</span>
        </a>
    </nav>

    <button class="logout-btn" onclick="logout()">
        <span>🚪</span>
        <span>Выйти</span>
    </button>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="container">
        <div id="profile-container">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Загрузка данных профиля при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
        loadUserData();
    });

    async function loadUserData() {
        const accessToken = localStorage.getItem('access_token');

        if (!accessToken) {
            showError('Вы не авторизованы. Пожалуйста, войдите в систему.');
            setTimeout(() => window.location.href = '/', 2000);
            return;
        }

        try {
            const response = await fetch('/v1/auth/me', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Content-Type': 'application/json'
                }
            });

            // Если получили ответ, парсим его
            const data = await response.json();

            if (!response.ok) {
                // Обработка разных типов ошибок
                if (response.status === 401) {
                    // Токен истёк или невалидный
                    const refreshToken = localStorage.getItem('refresh_token');
                    if (refreshToken) {
                        console.log('Токен истёк, пробуем обновить...');
                        const refreshed = await tryRefreshToken(refreshToken);
                        if (refreshed) {
                            // Токен обновлён, пробуем ещё раз
                            return await loadUserData();
                        }
                    }

                    // Не удалось обновить токен
                    showError(data.message || 'Сессия истекла. Пожалуйста, войдите снова.');
                    setTimeout(() => window.location.href = '/', 2000);
                    return;

                } else if (response.status === 403) {
                    showError(data.message || 'Доступ запрещён.');
                    return;

                } else if (response.status === 404) {
                    showError(data.message || 'Пользователь не найден.');
                    return;

                } else if (response.status >= 500) {
                    showError('Ошибка сервера. Пожалуйста, попробуйте позже.');
                    return;

                } else {
                    showError(data.message || 'Не удалось загрузить данные профиля.');
                    return;
                }
            }

            // Успешно получили данные
            displayUserData(data);

        } catch (error) {
            console.error('Ошибка при загрузке профиля:', error);

            if (error.name === 'TypeError' && error.message.includes('fetch')) {
                showError('Не удалось подключиться к серверу. Проверьте соединение.');
            } else {
                showError('Произошла ошибка при загрузке профиля. Пожалуйста, попробуйте позже.');
            }
        }
    }

    // Функция попытки обновить токен
    async function tryRefreshToken(refreshToken) {
        try {
            const response = await fetch('/v1/auth/refresh', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ refresh_token: refreshToken })
            });

            if (response.ok) {
                const data = await response.json();

                // Сохраняем новые токены
                localStorage.setItem('access_token', data.access_token);
                if (data.refresh_token) {
                    localStorage.setItem('refresh_token', data.refresh_token);
                }

                console.log('Токен успешно обновлён');
                return true;
            } else {
                console.log('Не удалось обновить токен');
                // Удаляем невалидные токены
                localStorage.removeItem('access_token');
                localStorage.removeItem('refresh_token');
                return false;
            }
        } catch (error) {
            console.error('Ошибка обновления токена:', error);
            return false;
        }
    }

    // Функция отображения данных пользователя
    function displayUserData(user) {
        const container = document.getElementById('profile-container');

        // Получаем первую букву имени для аватара
        const initial = user.firstname ? user.firstname.charAt(0).toUpperCase() : '?';

        // Форматируем дату создания
        const createdDate = new Date(user.createdAt).toLocaleDateString('ru-RU', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

        // Генерируем HTML с данными пользователя
        container.innerHTML = `
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar">${initial}</div>
                        <div class="profile-info">
                            <h1>${user.firstname} ${user.lastname}</h1>
                            <p>${user.email}</p>
                        </div>
                    </div>

                    <div class="profile-section">
                        <h2>📝 Основная информация</h2>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">Email</div>
                                <div class="info-value">${user.email}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Имя</div>
                                <div class="info-value">${user.firstname}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Фамилия</div>
                                <div class="info-value">${user.lastname}</div>
                            </div>
                            ${user.surname ? `
                            <div class="info-item">
                                <div class="info-label">Отчество</div>
                                <div class="info-value">${user.surname}</div>
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <div class="profile-section">
                        <h2>🔐 Статус аккаунта</h2>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">Email подтверждён</div>
                                <div class="info-value">
                                    ${user.emailVerified
            ? '<span class="badge badge-success">✓ Подтверждён</span>'
            : '<span class="badge badge-warning">✗ Не подтверждён</span>'}
                                </div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Дата регистрации</div>
                                <div class="info-value">${createdDate}</div>
                            </div>
                            ${user.updatedAt ? `
                            <div class="info-item">
                                <div class="info-label">Последнее обновление</div>
                                <div class="info-value">${new Date(user.updatedAt).toLocaleDateString('ru-RU')}</div>
                            </div>
                            ` : ''}
                        </div>
                    </div>

                    <div class="profile-section">
                        <h2>👥 Роли</h2>
                        <div>
                            ${user.roles.map(role =>
            `<span class="badge badge-primary">${role.name}</span>`
        ).join('')}
                        </div>
                    </div>
                </div>
            `;
    }

    // Функция отображения ошибки
    function showError(message) {
        const container = document.getElementById('profile-container');
        container.innerHTML = `
                <div class="error-state">
                    <div class="error-icon">⚠️</div>
                    <h2>Ошибка</h2>
                    <p class="error-message">${message}</p>
                    <button onclick="window.location.href='/'" class="btn-primary">
                        Вернуться на главную
                    </button>
                </div>
            `;

        // Скрываем sidebar при ошибке
        document.querySelector('.sidebar')?.remove();
    }

    // Функция выхода
    function logout() {
        // Удаляем токены из localStorage
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');

        // Редирект на главную страницу
        window.location.href = '/';
    }
</script>
</body>
</html>
