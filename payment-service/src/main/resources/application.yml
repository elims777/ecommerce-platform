server:
  port: 8090

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5437/payment_db
    username: user
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  jackson:
    serialization:
      write-dates-as-timestamps: false

tochka:
  base-url: https://enter.tochka.com/sandbox/v2/acquiring/v1.0
  token: ${TOCHKA_TOKEN}
  customer-code: ${TOCHKA_CUSTOMER_CODE}
  redirect-url: ${TOCHKA_REDIRECT_URL:http://localhost:3000/payment/success}
  fail-redirect-url: ${TOCHKA_FAIL_REDIRECT_URL:http://localhost:3000/payment/fail}

internal:
  secret: ${INTERNAL_SECRET}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    ru.rfsnab.paymentservice: DEBUG
