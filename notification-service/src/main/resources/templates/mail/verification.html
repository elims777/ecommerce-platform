<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
</head>
<body style="margin:0; padding:0; background-color:#F2F2F2;">

<div th:replace="~{mail/layout :: header}"></div>

<table width="600" cellpadding="0" cellspacing="0" border="0"
       style="width:600px; max-width:600px; margin:0 auto; background-color:#FFFFFF;">
    <tr>
        <td style="padding:32px 24px; font-family:Arial, system-ui, sans-serif;">
            <h2 style="color:#1E3A5F; margin:0 0 16px; text-align:center;">Добрый день, <span th:text="${firstName}"></span>!</h2>
            <p style="color:#1A1A1A; font-size:14px; line-height:20px; margin:0 0 16px;">
                Спасибо за регистрацию! Пожалуйста, подтвердите ваш email, перейдя по кнопке ниже.
            </p>
            <div th:replace="~{mail/layout :: button(${verificationLink}, 'Подтвердить email')}"></div>
            <p style="color:#1A1A1A; font-size:14px; line-height:20px; margin:16px 0;">
                Эта ссылка действует 1 час. Если это письмо пришло по ошибке, просто проигнорируйте его.
            </p>
            <p style="color:#1A1A1A; font-size:14px; margin:16px 0 0;">С наилучшими пожеланиями, команда rfsnab.ru!</p>
        </td>
    </tr>
</table>

<div th:replace="~{mail/layout :: footer}"></div>

</body>
</html>
