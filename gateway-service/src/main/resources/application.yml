server:
  port: 8080

spring:
  application:
    name: gateway-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # === AUTH-SERVICE (:9000) ===
                    # Login ? ??????? ????? (brute force ??????)
                    - id: auth-login
                      uri: http://localhost:9000
                      predicates:
                        - Path=/v1/auth/login
                        - Method=POST
                      filters:
                        - name: RequestRateLimiter
                          args:
                            redis-rate-limiter.replenishRate: 5
                            redis-rate-limiter.burstCapacity: 7
                            redis-rate-limiter.requestedTokens: 1
                            key-resolver: "#{@ipKeyResolver}"

                    # Register ? ??????? ?????
                    - id: auth-register
                      uri: http://localhost:9000
                      predicates:
                        - Path=/api/v1/register
                        - Method=POST
                      filters:
                        - name: RequestRateLimiter
                          args:
                            redis-rate-limiter.replenishRate: 3
                            redis-rate-limiter.burstCapacity: 5
                            redis-rate-limiter.requestedTokens: 1
                            key-resolver: "#{@ipKeyResolver}"

                    # ????????? auth API
                    - id: auth-api
                      uri: http://localhost:9000
                      predicates:
                        - Path=/v1/auth/**
                      filters:
                        - name: RequestRateLimiter
                          args:
                            redis-rate-limiter.replenishRate: 15
                            redis-rate-limiter.burstCapacity: 25
                            redis-rate-limiter.requestedTokens: 1
                            key-resolver: "#{@ipKeyResolver}"

                    # OAuth2
                    - id: auth-oauth2
                      uri: http://localhost:9000
                      predicates:
                        - Path=/oauth2/**
                      filters:
                        - name: RequestRateLimiter
                          args:
                            redis-rate-limiter.replenishRate: 5
                            redis-rate-limiter.burstCapacity: 7
                            redis-rate-limiter.requestedTokens: 1
                            key-resolver: "#{@ipKeyResolver}"

                    # ???-???????? (Thymeleaf)
                    - id: auth-pages
                      uri: http://localhost:9000
                      predicates:
                        - Path=/auth/**,/profile,/
                      filters:
                        - name: RequestRateLimiter
                          args:
                            redis-rate-limiter.replenishRate: 20
                            redis-rate-limiter.burstCapacity: 30
                            redis-rate-limiter.requestedTokens: 1
                            key-resolver: "#{@ipKeyResolver}"

                    # Verify email
                    - id: verify-email
                      uri: http://localhost:9000
                      predicates:
                        - Path=/verify-email

                    # === NOTIFICATION-SERVICE (:8082) ===
                    - id: notification-api
                      uri: http://localhost:8082
                      predicates:
                        - Path=/api/verification/**

                    # === ORDER-SERVICE (:8084) ===
                    - id: order-cart
                      uri: http://localhost:8084
                      predicates:
                        - Path=/api/v1/cart/**
                      filters:
                        - name: RequestRateLimiter
                          args:
                            redis-rate-limiter.replenishRate: 15
                            redis-rate-limiter.burstCapacity: 25
                            redis-rate-limiter.requestedTokens: 1
                            key-resolver: "#{@ipKeyResolver}"

                    - id: order-api
                      uri: http://localhost:8084
                      predicates:
                        - Path=/api/v1/orders/**
                      filters:
                        - name: RequestRateLimiter
                          args:
                            redis-rate-limiter.replenishRate: 15
                            redis-rate-limiter.burstCapacity: 25
                            redis-rate-limiter.requestedTokens: 1
                            key-resolver: "#{@ipKeyResolver}"

                    - id: order-warehouse
                      uri: http://localhost:8084
                      predicates:
                        - Path=/api/v1/warehouse-points/**

                    # === PRODUCT-SERVICE (:8083) ===
                    # ??????? ? ?????? ?? ????????
                    - id: product-api
                      uri: http://localhost:8083
                      predicates:
                        - Path=/api/v1/products/**
                      filters:
                        - name: RequestRateLimiter
                          args:
                            redis-rate-limiter.replenishRate: 20
                            redis-rate-limiter.burstCapacity: 30
                            redis-rate-limiter.requestedTokens: 1
                            key-resolver: "#{@ipKeyResolver}"

                    - id: category-api
                      uri: http://localhost:8083
                      predicates:
                        - Path=/api/v1/categories/**
                      filters:
                        - name: RequestRateLimiter
                          args:
                            redis-rate-limiter.replenishRate: 20
                            redis-rate-limiter.burstCapacity: 30
                            redis-rate-limiter.requestedTokens: 1
                            key-resolver: "#{@ipKeyResolver}"

# JWT
jwt:
  secret: "${SECRET_JWT}"

# ???????????
logging:
  level:
    ru.rfsnab.gatewayservice: DEBUG
    org.springframework.cloud.gateway: DEBUG